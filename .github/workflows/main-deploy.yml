name: Deploy Multi-Stack (Python & Blazor)

on:
  push:
    branches: [ main ]

jobs:
  # --- TRABAJO 1: COMPILAR Y SUBIR LANDING PAGE ---
  deploy-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Install and Build Landing
        run: |
          cd landing
          npm install
          npm run build

      - name: Deploy Landing to cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing/dist/
          server-dir: /contapanama.rsanjur.com/

  # --- TRABAJO 2: COMPILAR Y SUBIR BLAZOR ---
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Blazor
        run: dotnet publish frontend/ -c Release -o release-folder

      - name: Deploy Frontend to cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./release-folder/wwwroot/
          server-dir: /app.contapanama.rsanjur.com/

  # --- TRABAJO 3: SUBIR PYTHON (SIN COMPILAR) ---
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /app.contapanama.rsanjur.com/api/
